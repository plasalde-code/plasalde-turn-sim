<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log In — P.Lasalde Turn Simulator</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-size:15px;font-weight:700;color:#ef4444;margin-bottom:36px;letter-spacing:.3px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:40px;width:100%;max-width:400px}
h1{font-size:22px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:#94a3b8;margin-bottom:28px}
.field{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;
  color:#f1f5f9;font-size:14px;outline:none;transition:border .15s}
input:focus{border-color:#ef4444}
.btn{width:100%;padding:12px;background:#ef4444;color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .15s}
.btn:hover{background:#dc2626}
.btn:disabled{background:#475569;cursor:not-allowed}
.msg{font-size:13px;margin-top:14px;padding:10px 14px;border-radius:8px;display:none}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
.footer-links{margin-top:24px;text-align:center;font-size:13px;color:#64748b}
.footer-links a{color:#ef4444;font-weight:600}
</style>
</head>
<body>
<a href="index.html" class="logo">▶ P.Lasalde Turn Simulator</a>
<div class="card">
  <h1>Welcome back</h1>
  <p class="sub">Log in to access the simulator</p>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">Log In</button>
  <div class="msg" id="msg"></div>
  <div class="footer-links">
    Don't have an account? <a href="signup.html">Sign up free</a>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// If already logged in, go straight to app
supabase.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='app.html';
});

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('msg');

  if(!email || !password){ showMsg('Please enter your email and password.','error'); return; }

  btn.disabled = true; btn.textContent = 'Logging in…';
  msg.style.display = 'none';

  const {error} = await supabase.auth.signInWithPassword({email, password});

  if(error){
    showMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Log In';
  } else {
    showMsg('Success! Redirecting…', 'success');
    setTimeout(()=> window.location.href = 'app.html', 800);
  }
}

function showMsg(text, type){
  const el = document.getElementById('msg');
  el.textContent = text; el.className = 'msg '+type; el.style.display = 'block';
}

// Allow Enter key
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
